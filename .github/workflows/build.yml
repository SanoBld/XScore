name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: stable
      - run: flutter create --platforms=android --project-name xscore .
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: xscore-android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: stable
      - run: flutter config --enable-windows-desktop
      - run: flutter create --platforms=windows --project-name xscore .
      - run: flutter pub get
      - run: flutter build windows --release
      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath xscore-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: xscore-windows
          path: xscore-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: stable
      - run: flutter config --enable-linux-desktop
      - run: flutter create --platforms=linux --project-name xscore .
      - run: flutter pub get
      - run: flutter build linux --release
      - run: tar -czf xscore-linux.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: xscore-linux
          path: xscore-linux.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: stable
      - run: flutter config --enable-macos-desktop
      - run: flutter create --platforms=macos --project-name xscore .
      - run: flutter pub get
      - run: flutter build macos --release
      - run: ditto -c -k --sequesterRsrc build/macos/Build/Products/Release/xscore.app xscore-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: xscore-macos
          path: xscore-macos.zip

  release:
    needs: [build-android, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.apk" -o -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release/ \;
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true