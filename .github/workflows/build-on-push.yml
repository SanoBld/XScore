name: Build on Push

on:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - run: flutter create --platforms=android .
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: xscore-android-push
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - run: flutter config --enable-windows-desktop
      - run: flutter create --platforms=windows .
      - run: flutter pub get
      - run: flutter build windows --release
      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath xscore-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: xscore-windows-push
          path: xscore-windows.zip

  build-linux:
    name: Build Linux App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - run: flutter config --enable-linux-desktop
      - run: flutter create --platforms=linux .
      - run: flutter pub get
      - run: flutter build linux --release
      - run: tar -czf xscore-linux.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: xscore-linux-push
          path: xscore-linux.tar.gz

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - run: flutter config --enable-macos-desktop
      - run: flutter create --platforms=macos .
      - run: flutter pub get
      - run: flutter build macos --release
      - run: ditto -c -k --sequesterRsrc build/macos/Build/Products/Release/xscore.app xscore-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: xscore-macos-push
          path: xscore-macos.zip